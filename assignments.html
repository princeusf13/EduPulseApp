<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Assignments | EduPulse AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
    :root {
        --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        --glass-bg: rgba(255, 255, 255, 0.9);
    }

    body { 
        background: #f0f2f5; 
        background-image: radial-gradient(#667eea15 1px, transparent 1px);
        background-size: 20px 20px;
        min-height: 100vh;
    }

    /* Navbar Upgrade */
    .navbar {
        background: var(--glass-bg) !important;
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    
    .navbar-brand { 
        font-weight: 800; 
        letter-spacing: -1px;
        background: var(--primary-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    /* Card & Table Styling */
    .card { 
        border: none; 
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        overflow: hidden;
    }

    .table thead {
        background: #f8f9fa;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 1px;
    }

    .table td { vertical-align: middle; padding: 1.2rem 0.75rem; }

    /* Button Styling */
    .btn-primary {
        background: var(--primary-gradient);
        border: none;
        border-radius: 12px;
        padding: 10px 24px;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-action {
        border-radius: 10px;
        margin: 0 2px;
        transition: 0.2s;
    }

    /* Badge-style points */
    .points-badge {
        background: #eef2ff;
        color: #4338ca;
        padding: 5px 12px;
        border-radius: 20px;
        font-weight: 700;
        font-size: 0.85rem;
    }

    /* Modal Styling */
    .modal-content {
        border: none;
        border-radius: 25px;
    }

    .modal-header {
        background: var(--primary-gradient);
        color: white;
        border-radius: 25px 25px 0 0;
    }

    .btn-close { filter: brightness(0) invert(1); }
</style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">EduPulse AI</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle active" href="#" id="profDropdown" data-bs-toggle="dropdown">Admin</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="assignments.html">Assignments</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="visuals.html">Analytics</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Assignment Management</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#assignmentModal" onclick="prepareCreate()">
                <i class="bi bi-plus-lg"></i> Add Assignment
            </button>
        </div>

        <div id="successAlert" class="alert alert-success d-none" role="alert">
            Action completed successfully!
        </div>

        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Course Name</th>
                            <th>Deadline</th>
                            <th>Points</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="assignmentTableBody">
                        </tbody>
                </table>
                <div id="emptyState" class="text-center py-5 d-none">
                    <i class="bi bi-journal-x display-1 text-muted"></i>
                    <p class="mt-3 text-muted">No assignments created yet.</p>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="assignmentModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Add New Assignment</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="assignmentForm">
                        <input type="hidden" id="editIndex">
                        <div class="mb-3">
                            <label class="form-label">Course Name</label>
                            <input type="text" class="form-control" id="courseName" required placeholder="e.g. ISM 6225">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Assignment Type</label>
                            <select class="form-control" id="type">
                                <option>Homework</option>
                                <option>Quiz</option>
                                <option>Project</option>
                                <option>Exam</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Assignment Question/Prompt</label>
                            <textarea class="form-control" id="question" rows="3" required></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Points</label>
                                <input type="number" class="form-control" id="points" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Deadline</label>
                                <input type="date" class="form-control" id="deadline" required>
                            </div>
                        </div>
                        <div class="modal-footer px-0 pb-0">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                            <button type="submit" id="saveBtn" class="btn btn-primary">Save Assignment</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let assignments = JSON.parse(localStorage.getItem('eduAssignments')) || [];
        const modal = new bootstrap.Modal(document.getElementById('assignmentModal'));
        
        function renderTable() {
            const tbody = document.getElementById('assignmentTableBody');
            const emptyState = document.getElementById('emptyState');
            tbody.innerHTML = '';

            if (assignments.length === 0) {
                emptyState.classList.remove('d-none');
            } else {
                emptyState.classList.add('d-none');
                assignments.forEach((item, index) => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${index + 1}</td>
                            <td><strong>${item.course}</strong><br><small class="text-muted">${item.type}</small></td>
                            <td>${item.deadline}</td>
                            <td>${item.points}</td>
                            <td class="text-end">
                                <button class="btn btn-outline-info btn-action" onclick="viewItem(${index})"><i class="bi bi-eye"></i></button>
                                <button class="btn btn-outline-warning btn-action" onclick="prepareEdit(${index})"><i class="bi bi-pencil"></i></button>
                                <button class="btn btn-outline-danger btn-action" onclick="deleteItem(${index})"><i class="bi bi-trash"></i></button>
                            </td>
                        </tr>
                    `;
                });
            }
        }

        // Create logic
        function prepareCreate() {
            document.getElementById('assignmentForm').reset();
            document.getElementById('modalTitle').innerText = "Add New Assignment";
            document.getElementById('editIndex').value = "";
            document.getElementById('saveBtn').style.display = "block";
            toggleInputs(false);
        }

        // Save (Create or Update)
        document.getElementById('assignmentForm').onsubmit = function(e) {
            e.preventDefault();
            const index = document.getElementById('editIndex').value;
            const newAssignment = {
                course: document.getElementById('courseName').value,
                type: document.getElementById('type').value,
                question: document.getElementById('question').value,
                points: document.getElementById('points').value,
                deadline: document.getElementById('deadline').value
            };

            if (index === "") {
                assignments.push(newAssignment); // CREATE
            } else {
                assignments[index] = newAssignment; // UPDATE
            }

            localStorage.setItem('eduAssignments', JSON.stringify(assignments));
            modal.hide();
            showAlert();
            renderTable();
        };

        // Read (View)
        function viewItem(index) {
            prepareEdit(index);
            document.getElementById('modalTitle').innerText = "View Assignment Details";
            document.getElementById('saveBtn').style.display = "none";
            toggleInputs(true);
            modal.show();
        }

        // Update (Prepare)
        function prepareEdit(index) {
            const item = assignments[index];
            document.getElementById('courseName').value = item.course;
            document.getElementById('type').value = item.type;
            document.getElementById('question').value = item.question;
            document.getElementById('points').value = item.points;
            document.getElementById('deadline').value = item.deadline;
            document.getElementById('editIndex').value = index;
            document.getElementById('modalTitle').innerText = "Edit Assignment";
            document.getElementById('saveBtn').style.display = "block";
            toggleInputs(false);
            modal.show();
        }

        // Delete
        function deleteItem(index) {
            if(confirm('Are you sure you want to remove this assignment?')) {
                assignments.splice(index, 1);
                localStorage.setItem('eduAssignments', JSON.stringify(assignments));
                renderTable();
            }
        }

        function toggleInputs(disabled) {
            const inputs = document.querySelectorAll('#assignmentForm input, #assignmentForm select, #assignmentForm textarea');
            inputs.forEach(input => input.disabled = disabled);
        }

        function showAlert() {
            const alert = document.getElementById('successAlert');
            alert.classList.remove('d-none');
            setTimeout(() => alert.classList.add('d-none'), 3000);
        }

        // Initial Load
        renderTable();
    </script>
</body>
</html>

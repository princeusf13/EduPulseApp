<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tutor | Coming Soon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body { 
            background: #f0f2f5; 
            background-image: radial-gradient(#667eea15 1px, transparent 1px);
            background-size: 20px 20px;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }

        .coming-soon-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 600px;
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: var(--primary-gradient);
            color: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 25px;
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
        }

        .loader-bar {
            height: 6px;
            width: 200px;
            background: #eee;
            margin: 30px auto;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .loader-fill {
            height: 100%;
            width: 65%;
            background: var(--primary-gradient);
            border-radius: 10px;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.6; width: 30%; }
            50% { opacity: 1; width: 70%; }
            100% { opacity: 0.6; width: 30%; }
        }
    </style>
</head>
<body>

    <div class="coming-soon-card">
        <div class="icon-box">
            <i class="bi bi-robot"></i>
        </div>
        <h1 class="fw-bold mb-3">AI Tutor Lab</h1>
        <p class="text-muted lead">
            We are currently architecting a <strong>Multi-Agent AI Framework</strong> to provide real-time, context-aware assistance for your assignments.
        </p>
        
        <div class="loader-bar">
            <div class="loader-fill"></div>
        </div>

        <div class="row text-start mt-4">
            <div class="col-6">
                <small class="text-uppercase fw-bold text-primary" style="font-size: 0.7rem;">Status</small>
                <p class="small">LLM Fine-tuning (LoRA/QLoRA)</p>
            </div>
            <div class="col-6">
                <small class="text-uppercase fw-bold text-primary" style="font-size: 0.7rem;">Deployment</small>
                <p class="small">Azure AI Studio</p>
            </div>
        </div>

        <hr class="my-4">
        
        <a href="index.html" class="btn btn-outline-secondary rounded-pill px-4">
            <i class="bi bi-arrow-left me-2"></i>Back to Home
        </a>
    </div>

</body>
</html>
